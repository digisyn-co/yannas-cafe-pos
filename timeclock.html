<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Time Clock — Yanna's Café</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#FFFFFF; --bg2:#F7F5F2; --bg3:#EFECE8;
  --gold:#9E7B2F; --gold-d:#7A5F1F;
  --text:#1A1815; --text2:rgba(26,24,21,0.55); --text3:rgba(26,24,21,0.3);
  --green:#34C759; --amber:#FF9500; --red:#FF3B30; --sep:rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg2);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px}

.card{
  width:100%;max-width:380px;background:var(--bg);border:1px solid var(--sep);
  border-radius:24px;padding:28px 26px 30px;box-shadow:0 12px 40px rgba(0,0,0,0.06);
}
.head{text-align:center;margin-bottom:18px}
.title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700}
.sub{font-size:13px;color:var(--text2);margin-top:2px;letter-spacing:.3px}
.clock{font-size:15px;color:var(--gold);font-weight:700;font-variant-numeric:tabular-nums;margin-top:8px}

.dots{display:flex;justify-content:center;gap:14px;margin:22px 0 18px;height:18px}
.dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--gold);transition:all .12s}
.dot.on{background:var(--gold)}
.dots.err .dot{border-color:var(--red);animation:shake .4s}
.dots.ok .dot{border-color:var(--green);background:var(--green)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

.msg{text-align:center;min-height:22px;font-size:14px;font-weight:600;margin-bottom:14px}
.msg.in{color:var(--green)} .msg.out{color:var(--amber)} .msg.bad{color:var(--red)}

.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.key{
  aspect-ratio:1/1;border:none;border-radius:16px;background:var(--bg2);
  font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;color:var(--text);
  cursor:pointer;transition:all .1s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;
}
.key:active{background:var(--gold);color:#fff;transform:scale(.96)}
.key.util{font-size:16px;font-weight:600;color:var(--text2);background:var(--bg3)}
.key.util:active{background:var(--red);color:#fff}
.key.enter{background:var(--gold);color:#fff}
.key.enter:active{background:var(--gold-d)}

.foot{text-align:center;margin-top:16px;font-size:11px;color:var(--text3);letter-spacing:.5px}
.conn{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle}
.conn.off{background:var(--red)}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="title">Time Clock</div>
      <div class="sub">Enter your PIN to clock in or out</div>
      <div class="clock" id="clock">—</div>
    </div>

    <div class="dots" id="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="msg" id="msg"></div>

    <div class="pad" id="pad">
      <button class="key" onclick="press('1')">1</button>
      <button class="key" onclick="press('2')">2</button>
      <button class="key" onclick="press('3')">3</button>
      <button class="key" onclick="press('4')">4</button>
      <button class="key" onclick="press('5')">5</button>
      <button class="key" onclick="press('6')">6</button>
      <button class="key" onclick="press('7')">7</button>
      <button class="key" onclick="press('8')">8</button>
      <button class="key" onclick="press('9')">9</button>
      <button class="key util" onclick="clearPin()">Clear</button>
      <button class="key" onclick="press('0')">0</button>
      <button class="key enter" onclick="submitPin()">↵</button>
    </div>

    <div class="foot"><span class="conn" id="conn"></span><span id="conn-txt">Connecting…</span></div>
  </div>

<script>
const SUPABASE_URL='https://dgjtpxdbztnokfbmfjbw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnanRweGRienRub2tmYm1mamJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjY5NDAsImV4cCI6MjA5NTM0Mjk0MH0.uUyk7ppnom9PI--Fs_5wdhqQD-dtAmpB5Gv1hup6dAk';
let sb, pin='', busy=false;

const PIN_LEN=4; // must match how PINs are set in the POS

function initClient(){
  try{
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    setConn(true);
  }catch(e){ console.error(e); setConn(false); }
}
function setConn(ok){
  document.getElementById('conn').classList.toggle('off',!ok);
  document.getElementById('conn-txt').textContent=ok?'Yanna\u2019s Caf\u00e9':'Offline';
}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'})+
    ' \u00b7 '+now.toLocaleDateString('en-PH',{weekday:'short',month:'short',day:'numeric'});
}

function renderDots(){
  const dots=document.querySelectorAll('.dot');
  dots.forEach((d,i)=>d.classList.toggle('on',i<pin.length));
}
function setMsg(text,cls){
  const m=document.getElementById('msg');
  m.textContent=text||''; m.className='msg'+(cls?' '+cls:'');
}

function press(n){
  if(busy) return;
  if(pin.length>=PIN_LEN) return;
  pin+=n; renderDots(); setMsg('');
  if(pin.length===PIN_LEN) setTimeout(submitPin,150); // auto-submit when full
}
function clearPin(){ if(busy)return; pin=''; renderDots(); setMsg(''); }

async function submitPin(){
  if(busy) return;
  if(pin.length<PIN_LEN){ flash('err'); setMsg('Enter your '+PIN_LEN+'-digit PIN','bad'); return; }
  busy=true;
  try{
    const {data,error}=await sb.rpc('timeclock_punch',{p_pin:pin});
    const row=Array.isArray(data)?data[0]:data;
    if(error){ console.error(error); flash('err'); setMsg('Could not reach server','bad'); reset(1200); return; }
    if(!row||!row.ok){ flash('err'); setMsg('PIN not recognized','bad'); reset(1200); return; }
    flash('ok');
    const t=new Date(row.at).toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'});
    if(row.action==='in') setMsg('\u2705 '+row.employee_name+' \u2014 clocked IN at '+t,'in');
    else setMsg('\ud83d\udc4b '+row.employee_name+' \u2014 clocked OUT at '+t,'out');
    reset(2600);
  }catch(e){
    console.error(e); flash('err'); setMsg('Something went wrong','bad'); reset(1200);
  }
}

function flash(kind){
  const d=document.getElementById('dots');
  d.classList.remove('err','ok'); void d.offsetWidth; d.classList.add(kind);
}
function reset(ms){
  setTimeout(()=>{
    pin=''; renderDots(); busy=false;
    document.getElementById('dots').classList.remove('err','ok');
    setMsg('');
  },ms);
}

// hardware keypad support
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9') press(e.key);
  else if(e.key==='Enter') submitPin();
  else if(e.key==='Backspace'||e.key==='Delete'){ if(!busy){pin=pin.slice(0,-1);renderDots();} }
});

initClient();
updateClock(); setInterval(updateClock,15000);
renderDots();
</script>
</body>
</html>
