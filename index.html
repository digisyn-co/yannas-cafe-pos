<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Yanna's Vietnamese Cafe — POS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#3B6D11;--green-l:#EAF3DE;--green-m:#639922;--green-b:#97C459;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --red:#A32D2D;--red-l:#FCEBEB;
  --teal:#0F6E56;--teal-l:#E1F5EE;--teal-m:#1D9E75;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --bg:#fff;--bg2:#F8F8F6;--bg3:#F1EFE8;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:0.5px solid #e0ded6;--bord2:0.5px solid #ccc;
  --r:8px;--rl:12px;
}
body{background:var(--bg3);color:var(--text);font-size:14px;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:var(--border);position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.logo span{color:var(--green)}
.tabs{display:flex;gap:4px}
.tab{padding:6px 12px;border-radius:var(--r);border:var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px}
.tab.active{background:var(--bg);color:var(--text);border-color:#aaa;font-weight:600}
.tab:hover:not(.active){background:var(--bg2)}
.tab-icon{font-size:15px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block}
.status-dot.live{background:#22c55e;box-shadow:0 0 0 2px #dcfce7}
.page{display:none;padding:14px;max-width:1200px;margin:0 auto}
.page.active{display:block}

/* POS */
.pos-wrap{display:grid;grid-template-columns:1fr 300px;gap:12px;height:calc(100vh - 57px - 28px)}
@media(max-width:700px){
  .pos-wrap{grid-template-columns:1fr;height:auto}
  .order-panel{position:fixed;bottom:0;left:0;right:0;height:auto;max-height:50vh;border-radius:var(--rl) var(--rl) 0 0;z-index:40;box-shadow:0 -4px 20px rgba(0,0,0,0.1)}
  .menu-panel{padding-bottom:220px}
  .tabs .tab-label{display:none}
}
.menu-panel{overflow-y:auto}
.cat-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.cat-btn{padding:5px 12px;border-radius:20px;border:var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap}
.cat-btn.active{background:var(--green-l);color:var(--green);border-color:var(--green-b);font-weight:600}
.cat-btn:hover:not(.active){background:var(--bg2)}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.menu-card{border:var(--border);border-radius:var(--rl);padding:11px;cursor:pointer;background:var(--bg);transition:border-color .15s,transform .1s;user-select:none}
.menu-card:hover{border-color:#bbb}
.menu-card:active{transform:scale(0.96)}
.mbadge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:10px;margin-bottom:5px;font-weight:500}
.bc{background:#FAEEDA;color:#854F0B}
.bt{background:var(--teal-l);color:var(--teal)}
.bf{background:var(--bg3);color:#444}
.bco{background:var(--purple-l);color:var(--purple)}
.bm{background:var(--green-l);color:var(--green)}
.mname{font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.3}
.msize{font-size:10px;color:var(--text3);margin-bottom:4px}
.mprice{font-size:14px;font-weight:700;color:var(--green)}
.profit-star{font-size:10px;margin-left:2px}

/* ORDER PANEL */
.order-panel{display:flex;flex-direction:column;border:var(--border);border-radius:var(--rl);background:var(--bg);overflow:hidden}
.order-head{padding:11px 14px;border-bottom:var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.order-head h3{font-size:14px;font-weight:600}
.order-items{flex:1;overflow-y:auto;padding:6px}
.empty-order{text-align:center;padding:32px 0;color:var(--text3);font-size:13px}
.order-row{display:flex;align-items:center;gap:6px;padding:5px 4px;border-bottom:var(--border)}
.order-row:last-child{border-bottom:none}
.oname{flex:1;font-size:12px;line-height:1.3;font-weight:500}
.qty-ctrl{display:flex;align-items:center;gap:3px}
.qb{width:22px;height:22px;border-radius:50%;border:var(--border);background:transparent;cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;color:var(--text)}
.qb:hover{background:var(--bg2)}
.qn{font-size:13px;font-weight:600;min-width:16px;text-align:center}
.oprice{font-size:12px;font-weight:600;color:var(--green);min-width:42px;text-align:right}
.order-foot{border-top:var(--border);padding:11px 14px;flex-shrink:0}
.sub-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:3px}
.tot-row{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:10px}
.pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pbtn{padding:8px;border-radius:var(--r);border:var(--border);background:transparent;cursor:pointer;font-size:12px;font-weight:500}
.pbtn:hover{background:var(--bg2)}
.pbtn-main{background:var(--green-l);border-color:var(--green-b);color:var(--green);font-weight:700;grid-column:span 2;padding:11px;font-size:13px}
.pbtn-main:hover{background:#C0DD97}
.pbtn-main:disabled{opacity:0.5;cursor:not-allowed}
.clr-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 4px}
.clr-btn:hover{color:var(--red)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg);border-radius:var(--rl);padding:22px;width:100%;max-width:320px;border:var(--border);box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.ml{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:10px}
.mi{width:100%;padding:8px 10px;border:var(--border);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--bg)}
.mi:focus{outline:none;border-color:#888}
.mbtns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.mbtn{padding:7px 16px;border-radius:var(--r);border:var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:500}
.mbtn.ok{background:var(--green-l);border-color:var(--green-b);color:var(--green)}
.mbtn.print-btn{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.mbtn:hover{background:var(--bg2)}
.mbtn.ok:hover{background:#C0DD97}
.mbtn.print-btn:hover{background:#333}

/* RECEIPT MODAL */
.receipt-modal-inner{max-width:340px;padding:0;overflow:hidden}
.receipt-preview{background:#fff;padding:24px 20px;font-family:'Courier New',monospace}
.r-logo{text-align:center;margin-bottom:4px;font-size:20px}
.r-shopname{text-align:center;font-size:15px;font-weight:700;letter-spacing:0.5px;margin-bottom:2px}
.r-tagline{text-align:center;font-size:11px;color:var(--text2);margin-bottom:2px}
.r-address{text-align:center;font-size:10px;color:var(--text3);margin-bottom:10px}
.r-divider{border:none;border-top:1px dashed #ccc;margin:8px 0}
.r-meta{font-size:11px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
.r-items-head{display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.r-item-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;padding:2px 0}
.r-item-name{flex:1;line-height:1.3}
.r-item-qty{width:28px;text-align:center;color:var(--text2);font-size:11px}
.r-item-price{width:52px;text-align:right;font-weight:600}
.r-subtotal-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:2px 0}
.r-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:700;padding:4px 0;border-top:1px solid #333;margin-top:4px}
.r-payment-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.r-change-row{display:flex;justify-content:space-between;font-size:12px;font-weight:600;padding:2px 0;color:var(--teal)}
.r-footer{text-align:center;font-size:10px;color:var(--text2);margin-top:10px;line-height:1.6}
.r-order-num{text-align:center;font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.cash-section{padding:14px 20px;border-top:var(--border);background:var(--bg2)}
.cash-section label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px}
.cash-section input{width:100%;padding:8px 10px;border:var(--border);border-radius:var(--r);font-size:14px;font-weight:600;color:var(--text);background:var(--bg)}
.cash-section input:focus{outline:none;border-color:#888}
.change-display{display:flex;justify-content:space-between;margin-top:8px;font-size:14px;font-weight:700}
.change-display .change-val{color:var(--teal)}
.receipt-actions{padding:14px 20px;display:flex;gap:8px;border-top:var(--border)}
.receipt-actions button{flex:1;padding:10px;border-radius:var(--r);border:var(--border);cursor:pointer;font-size:13px;font-weight:600}
.btn-print{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-print:hover{background:#333}
.btn-confirm{background:var(--green-l);color:var(--green);border-color:var(--green-b)}
.btn-confirm:hover{background:#C0DD97}
.btn-cancel{background:transparent;color:var(--text2)}
.btn-cancel:hover{background:var(--bg2)}

/* INVENTORY */
.inv-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.inv-section{background:var(--bg);border-radius:var(--rl);padding:14px;border:var(--border)}
.sec-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.inv-table{width:100%;border-collapse:collapse;font-size:13px}
.inv-table th{text-align:left;padding:4px 6px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:var(--border)}
.inv-table td{padding:6px 6px;border-bottom:var(--border);vertical-align:middle}
.inv-table tr:last-child td{border-bottom:none}
.inv-table tr:hover td{background:var(--bg2)}
.sbar{width:64px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:5px}
.sfill{height:100%;border-radius:3px}
.sok-f{background:var(--green-m)}
.slow-f{background:var(--amber)}
.sout-f{background:var(--red)}
.sbadge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600}
.sok{background:var(--green-l);color:var(--green)}
.slow{background:var(--amber-l);color:var(--amber)}
.sout{background:var(--red-l);color:var(--red)}
.adj-btn{font-size:11px;padding:3px 8px;border-radius:var(--r);border:var(--border);background:transparent;cursor:pointer;color:var(--text2)}
.adj-btn:hover{background:var(--bg2)}
.restock-btn{padding:7px 14px;border-radius:var(--r);border:0.5px solid var(--green-b);background:var(--green-l);color:var(--green);cursor:pointer;font-size:13px;font-weight:600}
.restock-btn:hover{background:#C0DD97}

/* ORDERS */
.orders-wrap{display:flex;flex-direction:column;gap:8px}
.log-entry{border:var(--border);border-radius:var(--rl);padding:12px 16px;background:var(--bg)}
.log-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.log-id{font-size:13px;font-weight:700}
.log-time{font-size:11px;color:var(--text2)}
.log-items-text{font-size:12px;color:var(--text2);margin-bottom:7px;line-height:1.5}
.log-foot{display:flex;justify-content:space-between;align-items:center}
.log-total{font-size:14px;font-weight:700;color:var(--green)}
.log-method{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--text2)}
.reprint-btn{font-size:11px;padding:3px 10px;border-radius:var(--r);border:var(--border);background:transparent;cursor:pointer;color:var(--text2)}
.reprint-btn:hover{background:var(--bg2)}

/* REPORTS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric-card{background:var(--bg2);border-radius:var(--r);padding:14px;border:var(--border)}
.metric-lbl{font-size:11px;color:var(--text2);margin-bottom:5px}
.metric-val{font-size:24px;font-weight:700}
.rep-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.rep-row{grid-template-columns:1fr}}
.rep-card{border:var(--border);border-radius:var(--rl);padding:16px;background:var(--bg)}
.rep-card h4{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text2)}
.rank-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:var(--border);font-size:12px}
.rank-item:last-child{border-bottom:none}
.rank-n{width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rank-bw{flex:1}
.rank-bar{height:5px;border-radius:3px;background:var(--green-m);margin-top:3px}
.rank-amt{font-weight:700;color:var(--green);min-width:52px;text-align:right}
.no-data{text-align:center;padding:28px;color:var(--text3);font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:var(--rl);font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:12px}
.loading-screen .logo-big{font-size:32px;font-weight:800}
.loading-screen .logo-big span{color:var(--green)}
.spinner{width:24px;height:24px;border:2px solid var(--bg3);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PRINT STYLES */
@media print {
  body * { visibility: hidden }
  #print-area, #print-area * { visibility: visible }
  #print-area {
    position: fixed;
    left: 0; top: 0;
    width: 80mm;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #000;
    background: #fff;
    padding: 4mm;
  }
  .no-print { display: none !important }
}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="logo-big">☕ Yanna's <span>Cafe</span></div>
  <div class="spinner"></div>
  <p id="loading-msg">Connecting to database…</p>
</div>

<!-- Hidden print area -->
<div id="print-area" style="display:none"></div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="logo">☕ Yanna's <span>Vietnamese</span> Cafe</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('pos')"><span class="tab-icon">🧾</span><span class="tab-label"> POS</span></button>
      <button class="tab" onclick="switchTab('inventory')"><span class="tab-icon">📦</span><span class="tab-label"> Inventory</span></button>
      <button class="tab" onclick="switchTab('orders')"><span class="tab-icon">📋</span><span class="tab-label"> Orders</span></button>
      <button class="tab" onclick="switchTab('reports')"><span class="tab-icon">📊</span><span class="tab-label"> Reports</span></button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)">
      <span class="status-dot live"></span>
      <span>Live</span>
      <span id="clock" style="margin-left:4px"></span>
    </div>
  </div>

  <!-- POS -->
  <div class="page active" id="page-pos">
    <div class="pos-wrap">
      <div class="menu-panel">
        <div class="cat-bar" id="cat-bar"></div>
        <div class="menu-grid" id="menu-grid"></div>
      </div>
      <div class="order-panel">
        <div class="order-head">
          <h3>🧾 Current Order</h3>
          <button class="clr-btn" onclick="clearOrder()">Clear</button>
        </div>
        <div class="order-items" id="order-items">
          <div class="empty-order">Tap items to add</div>
        </div>
        <div class="order-foot">
          <div class="sub-row"><span>Items</span><span id="item-count">0</span></div>
          <div class="sub-row"><span>Subtotal</span><span id="subtotal">₱0</span></div>
          <div class="tot-row"><span>Total</span><span id="total-amt">₱0</span></div>
          <div class="pay-btns">
            <button class="pbtn" onclick="checkout('Cash')">💵 Cash</button>
            <button class="pbtn" onclick="checkout('GCash')">📱 GCash</button>
            <button class="pbtn-main pbtn" id="place-btn" onclick="checkout('Cash')" disabled>Place Order</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Inventory -->
  <div class="page" id="page-inventory">
    <div class="inv-header">
      <div style="font-size:16px;font-weight:700">Ingredient Inventory</div>
      <button class="restock-btn" onclick="restockAll()">↺ Restock All</button>
    </div>
    <div class="inv-grid" id="inv-grid"></div>
  </div>

  <!-- Orders -->
  <div class="page" id="page-orders">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700">Order History</div>
      <div style="font-size:12px;color:var(--text2)" id="orders-summary"></div>
    </div>
    <div class="orders-wrap" id="orders-log">
      <div class="no-data">No orders yet today</div>
    </div>
  </div>

  <!-- Reports -->
  <div class="page" id="page-reports">
    <div class="metrics-grid" id="metrics-grid"></div>
    <div class="rep-row">
      <div class="rep-card"><h4>🏆 Top Selling Items</h4><div id="top-items"><div class="no-data">No sales yet</div></div></div>
      <div class="rep-card"><h4>💰 Revenue by Category</h4><div id="rev-cat"><div class="no-data">No sales yet</div></div></div>
    </div>
  </div>
</div>

<div id="modal-container"></div>
<div class="toast" id="toast"></div>

const INIT_INV=[
  {id:'robusta',name:"Dark Roast Robusta",unit:"g",stock:2000,max:3000,cat:"Coffee"},
  {id:'condensed',name:"Condensed Milk",unit:"g",stock:800,max:1000,cat:"Coffee"},
  {id:'fresh_milk',name:"Fresh Milk",unit:"ml",stock:1500,max:2000,cat:"Coffee"},
  {id:'heavy_cream',name:"Heavy Cream",unit:"ml",stock:600,max:1000,cat:"Coffee"},
  {id:'coconut_cream',name:"Coconut Cream",unit:"ml",stock:300,max:500,cat:"Coffee"},
  {id:'eggs',name:"Eggs",unit:"pcs",stock:12,max:30,cat:"Coffee"},
  {id:'sea_salt',name:"Sea Salt",unit:"g",stock:200,max:500,cat:"Coffee"},
  {id:'jasmine_tea',name:"Jasmine Tea",unit:"g",stock:80,max:200,cat:"Tea & Matcha"},
  {id:'black_tea',name:"Black Tea",unit:"g",stock:60,max:200,cat:"Tea & Matcha"},
  {id:'matcha',name:"Matcha Powder",unit:"g",stock:40,max:100,cat:"Tea & Matcha"},
  {id:'lychee_syrup',name:"Lychee Syrup",unit:"ml",stock:250,max:500,cat:"Tea & Matcha"},
  {id:'strawberry',name:"Strawberry Puree",unit:"ml",stock:200,max:500,cat:"Tea & Matcha"},
  {id:'mango',name:"Mango Puree",unit:"ml",stock:150,max:500,cat:"Tea & Matcha"},
  {id:'passion',name:"Passion Fruit Syrup",unit:"ml",stock:80,max:500,cat:"Tea & Matcha"},
  {id:'baguette',name:"Baguette / Loaf",unit:"pcs",stock:15,max:30,cat:"Food"},
  {id:'pork',name:"Pork Shoulder",unit:"g",stock:1200,max:2000,cat:"Food"},
  {id:'chicken',name:"Chicken Thigh",unit:"g",stock:800,max:2000,cat:"Food"},
  {id:'beef',name:"Beef Sirloin",unit:"g",stock:400,max:1500,cat:"Food"},
  {id:'liver_spread',name:"Liver Spread",unit:"pcs",stock:3,max:10,cat:"Food"},
  {id:'hot_cups',name:"Hot Cups",unit:"pcs",stock:80,max:200,cat:"Supplies"},
  {id:'cold_cups',name:"Cold Cups",unit:"pcs",stock:60,max:200,cat:"Supplies"},
  {id:'paper_bags',name:"Paper Bags",unit:"pcs",stock:25,max:100,cat:"Supplies"},
];

let sb,order=[],activeCategory='All',currentPayMethod='Cash';
let invData=[],orderHistory=[];

async function init(){
  setLoading('Connecting to database…');
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  setLoading('Setting up inventory…');
  await setupInventory();
  setLoading('Loading orders…');
  await loadOrders();
  setLoading('Starting live sync…');
  subscribeRealtime();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  renderMenu();
  updateClock();
  setInterval(updateClock,10000);
  toast('Connected ✓');
}

async function setupInventory(){
  const {data,error}=await sb.from('inventory').select('*');
  if(error||!data||data.length===0){
    const rows=INIT_INV.map(i=>({id:i.id,name:i.name,unit:i.unit,stock:i.stock,max_stock:i.max,cat:i.cat}));
    await sb.from('inventory').upsert(rows,{onConflict:'id'});
    invData=JSON.parse(JSON.stringify(INIT_INV));
  } else {
    invData=data.map(d=>({id:d.id,name:d.name,unit:d.unit,stock:d.stock,max:d.max_stock,cat:d.cat}));
  }
}

async function loadOrders(){
  const today=new Date().toISOString().split('T')[0];
  const {data}=await sb.from('orders').select('*').gte('created_at',today+'T00:00:00').order('created_at',{ascending:false});
  if(data) orderHistory=data.map(d=>({
    id:d.order_number,
    time:new Date(d.created_at).toLocaleString('en-PH',{dateStyle:'short',timeStyle:'short'}),
    items:d.items,total:d.total,method:d.payment_method,
    created_at:d.created_at
  }));
}

function subscribeRealtime(){
  sb.channel('orders-channel')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'orders'},payload=>{
      const d=payload.new;
      const entry={id:d.order_number,time:new Date(d.created_at).toLocaleString('en-PH',{dateStyle:'short',timeStyle:'short'}),items:d.items,total:d.total,method:d.payment_method,created_at:d.created_at};
      if(!orderHistory.find(o=>o.id===entry.id)){
        orderHistory.unshift(entry);
        if(document.getElementById('page-orders').classList.contains('active')) renderOrders();
        if(document.getElementById('page-reports').classList.contains('active')) renderReports();
        toast('New order '+entry.id);
      }
    }).subscribe();
  sb.channel('inventory-channel')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'inventory'},payload=>{
      const d=payload.new;
      const item=invData.find(i=>i.id===d.id);
      if(item) item.stock=d.stock;
      if(document.getElementById('page-inventory').classList.contains('active')) renderInventory();
    }).subscribe();
}

// ── MENU ──────────────────────────────────────
function renderMenu(){
  const cats=['All',...new Set(MENU.map(m=>m.cat))];
  document.getElementById('cat-bar').innerHTML=cats.map(c=>
    `<button class="cat-btn${c===activeCategory?' active':''}" onclick="filterCat('${c}')">${c}</button>`
  ).join('');
  const filtered=activeCategory==='All'?MENU:MENU.filter(m=>m.cat===activeCategory);
  document.getElementById('menu-grid').innerHTML=filtered.map(item=>`
    <div class="menu-card" onclick="addItem(${item.id})">
      <span class="mbadge ${item.badge}">${item.cat}</span>
      <div class="mname">${item.name}${item.profit?'<span class="profit-star">⭐</span>':''}</div>
      ${item.size?`<div class="msize">${item.size}</div>`:''}
      <div class="mprice">₱${item.price}</div>
    </div>`).join('');
}
function filterCat(cat){activeCategory=cat;renderMenu();}

// ── ORDER ─────────────────────────────────────
function addItem(id){
  const item=MENU.find(m=>m.id===id);
  const ex=order.find(o=>o.id===id);
  if(ex) ex.qty++; else order.push({...item,qty:1});
  renderOrder();
}
function removeItem(id){
  const idx=order.findIndex(o=>o.id===id);
  if(idx<0) return;
  if(--order[idx].qty<=0) order.splice(idx,1);
  renderOrder();
}
function clearOrder(){order=[];renderOrder();}
function renderOrder(){
  const el=document.getElementById('order-items');
  const btn=document.getElementById('place-btn');
  if(!order.length){
    el.innerHTML='<div class="empty-order">Tap items to add</div>';
    document.getElementById('subtotal').textContent='₱0';
    document.getElementById('total-amt').textContent='₱0';
    document.getElementById('item-count').textContent='0';
    btn.disabled=true;return;
  }
  const total=order.reduce((s,o)=>s+o.price*o.qty,0);
  const count=order.reduce((s,o)=>s+o.qty,0);
  el.innerHTML=order.map(o=>`
    <div class="order-row">
      <div class="oname">${o.name}</div>
      <div class="qty-ctrl">
        <button class="qb" onclick="removeItem(${o.id})">−</button>
        <span class="qn">${o.qty}</span>
        <button class="qb" onclick="addItem(${o.id})">+</button>
      </div>
      <div class="oprice">₱${o.price*o.qty}</div>
    </div>`).join('');
  document.getElementById('subtotal').textContent='₱'+total;
  document.getElementById('total-amt').textContent='₱'+total;
  document.getElementById('item-count').textContent=count+' item'+(count!==1?'s':'');
  btn.disabled=false;
}

// ── CHECKOUT & RECEIPT ────────────────────────
function checkout(method){
  if(!order.length) return;
  currentPayMethod=method;
  showReceiptModal(order,method,null);
}

function showReceiptModal(items,method,savedOrder){
  const total=items.reduce((s,o)=>s+o.price*o.qty,0);
  const now=savedOrder?savedOrder.time:new Date().toLocaleString('en-PH',{dateStyle:'medium',timeStyle:'short'});
  const orderNum=savedOrder?savedOrder.id:'NEW';
  const isCash=method==='Cash';
  const isNew=!savedOrder;

  document.getElementById('modal-container').innerHTML=`
    <div class="modal-bg" id="receipt-modal">
      <div class="modal receipt-modal-inner">
        <div class="receipt-preview" id="receipt-content">
          <div class="r-logo">☕</div>
          <div class="r-shopname">YANNA'S VIETNAMESE CAFE</div>
          <div class="r-tagline">Authentic Vietnamese Coffee & Food</div>
          <div class="r-address">Bacolod City, Negros Occidental</div>
          <hr class="r-divider">
          <div class="r-order-num">ORDER ${orderNum}</div>
          <div class="r-meta"><span>${now}</span><span>${method}</span></div>
          <hr class="r-divider">
          <div class="r-items-head"><span>ITEM</span><span style="width:28px;text-align:center">QTY</span><span style="width:52px;text-align:right">AMOUNT</span></div>
          ${items.map(o=>`
            <div class="r-item-row">
              <div class="r-item-name">${o.name}</div>
              <div class="r-item-qty">${o.qty}</div>
              <div class="r-item-price">₱${o.price*o.qty}</div>
            </div>
            <div style="font-size:10px;color:#999;padding:0 0 3px 0">@ ₱${o.price} each</div>
          `).join('')}
          <hr class="r-divider">
          <div class="r-subtotal-row"><span>SUBTOTAL</span><span>₱${total}</span></div>
          <div class="r-total-row"><span>TOTAL</span><span>₱${total}</span></div>
          ${isCash?`
          <div class="r-payment-row" id="r-cash-line"><span>CASH</span><span id="r-cash-val">—</span></div>
          <div class="r-change-row" id="r-change-line"><span>CHANGE</span><span id="r-change-val">—</span></div>`:''}
          <hr class="r-divider">
          <div class="r-footer">
            Thank you for your visit!<br>
            Please come again 🙏<br>
            --------------------------------
          </div>
        </div>
        ${isCash&&isNew?`
        <div class="cash-section">
          <label>Cash received from customer</label>
          <input type="number" id="cash-in" placeholder="₱0.00" oninput="calcChange(${total})" autofocus/>
          <div class="change-display"><span>Change</span><span class="change-val" id="change-out">—</span></div>
        </div>`:''}
        <div class="receipt-actions">
          ${isNew?`<button class="btn-confirm" onclick="confirmOrder()">✓ Confirm & Save</button>`:''}
          <button class="btn-print" onclick="printReceipt()">🖨️ Print</button>
          <button class="btn-cancel" onclick="closeModal()">✕</button>
        </div>
      </div>
    </div>`;
}

function calcChange(total){
  const r=parseFloat(document.getElementById('cash-in').value)||0;
  const c=r-total;
  const cashVal=r>0?'₱'+r:'—';
  const changeVal=r>0?(c>=0?'₱'+c:'Short ₱'+Math.abs(c)):'—';
  document.getElementById('r-cash-val').textContent=cashVal;
  document.getElementById('r-change-val').textContent=changeVal;
  document.getElementById('change-out').textContent=changeVal;
}

function printReceipt(){
  const content=document.getElementById('receipt-content').innerHTML;
  const printArea=document.getElementById('print-area');
  printArea.innerHTML=content;
  printArea.style.display='block';
  window.print();
  printArea.style.display='none';
}

async function confirmOrder(){
  const total=order.reduce((s,o)=>s+o.price*o.qty,0);
  const num=orderHistory.length+1;
  const orderNum='#'+String(num).padStart(4,'0');

  // Update order number on receipt before saving
  const orderNumEl=document.querySelector('#receipt-content .r-order-num');
  if(orderNumEl) orderNumEl.textContent='ORDER '+orderNum;

  const {error}=await sb.from('orders').insert({
    order_number:orderNum,
    items:order.map(o=>({id:o.id,name:o.name,qty:o.qty,price:o.price,cat:o.cat})),
    total,payment_method:currentPayMethod
  });
  if(error){toast('Save failed — check connection');console.error(error);return;}

  await deductInventory([...order]);

  const now=new Date().toLocaleString('en-PH',{dateStyle:'short',timeStyle:'short'});
  orderHistory.unshift({id:orderNum,time:now,items:[...order],total,method:currentPayMethod});

  // Auto-print after confirming
  printReceipt();

  order=[];
  renderOrder();
  closeModal();
  toast('Order '+orderNum+' saved & printed ✓');
}

async function deductInventory(items){
  const updates={};
  const adj=(id,amt)=>{const i=invData.find(x=>x.id===id);if(i){i.stock=Math.max(0,i.stock-amt);updates[id]=i.stock;}};
  items.forEach(o=>{
    if(['Coffee','Combo'].includes(o.cat)){adj('robusta',50*o.qty);adj('fresh_milk',50*o.qty);adj('cold_cups',o.qty);}
    if(['Tea'].includes(o.cat)){adj('jasmine_tea',2*o.qty);adj('cold_cups',o.qty);}
    if(['Matcha'].includes(o.cat)){adj('matcha',2*o.qty);adj('fresh_milk',50*o.qty);adj('cold_cups',o.qty);}
    if(['Food','Combo'].includes(o.cat)){adj('baguette',o.qty);adj('paper_bags',o.qty);}
  });
  for(const [id,stock] of Object.entries(updates)){
    await sb.from('inventory').update({stock}).eq('id',id);
  }
}

function closeModal(){document.getElementById('modal-container').innerHTML='';}

// ── INVENTORY ─────────────────────────────────
async function renderInventory(){
  const {data}=await sb.from('inventory').select('*');
  if(data) invData=data.map(d=>({id:d.id,name:d.name,unit:d.unit,stock:d.stock,max:d.max_stock,cat:d.cat}));
  const cats=[...new Set(invData.map(i=>i.cat))];
  document.getElementById('inv-grid').innerHTML=cats.map(cat=>{
    const items=invData.filter(i=>i.cat===cat);
    return `<div class="inv-section"><div class="sec-title">${cat}</div>
      <table class="inv-table"><thead><tr><th>Ingredient</th><th>Stock</th><th>Level</th><th></th></tr></thead>
      <tbody>${items.map(item=>{
        const pct=Math.round(item.stock/item.max*100);
        const fc=pct>50?'sok-f':pct>20?'slow-f':'sout-f';
        const bc=pct>50?'sok':pct>20?'slow':'sout';
        const txt=pct>50?'OK':pct>20?'Low':'Out';
        return `<tr><td>${item.name}</td>
          <td style="font-weight:600;font-size:12px">${item.stock} ${item.unit}</td>
          <td><div class="sbar"><div class="sfill ${fc}" style="width:${pct}%"></div></div><span class="sbadge ${bc}">${txt}</span></td>
          <td><button class="adj-btn" onclick="showAdj('${item.id}')">Edit</button></td></tr>`;
      }).join('')}</tbody></table></div>`;
  }).join('');
}

function showAdj(id){
  const item=invData.find(i=>i.id===id);
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-bg"><div class="modal">
      <h3>Adjust Stock</h3>
      <span class="ml">Ingredient: <strong>${item.name}</strong></span>
      <span class="ml">Current: ${item.stock} ${item.unit} · Max: ${item.max} ${item.unit}</span>
      <label class="ml" style="margin-top:10px">New stock level (${item.unit})</label>
      <input class="mi" type="number" id="adj-val" value="${item.stock}" min="0"/>
      <div class="mbtns">
        <button class="mbtn ok" onclick="applyAdj('${id}')">Update</button>
        <button class="mbtn" onclick="closeModal()">Cancel</button>
      </div>
    </div></div>`;
}

async function applyAdj(id){
  const val=parseInt(document.getElementById('adj-val').value)||0;
  await sb.from('inventory').update({stock:val}).eq('id',id);
  const item=invData.find(i=>i.id===id);
  if(item) item.stock=val;
  closeModal();
  renderInventory();
  toast('Stock updated ✓');
}

async function restockAll(){
  for(const i of invData){await sb.from('inventory').update({stock:i.max}).eq('id',i.id);i.stock=i.max;}
  renderInventory();
  toast('All items restocked ✓');
}

// ── ORDERS ────────────────────────────────────
async function renderOrders(){
  await loadOrders();
  const log=document.getElementById('orders-log');
  const sum=document.getElementById('orders-summary');
  if(!orderHistory.length){log.innerHTML='<div class="no-data">No orders yet today</div>';sum.textContent='';return;}
  const total=orderHistory.reduce((s,o)=>s+o.total,0);
  sum.textContent=`${orderHistory.length} orders · ₱${total.toLocaleString()} total`;
  log.innerHTML=orderHistory.map(o=>`
    <div class="log-entry">
      <div class="log-head">
        <span class="log-id">${o.id}</span>
        <span class="log-time">${o.time}</span>
      </div>
      <div class="log-items-text">${o.items.map(i=>`${i.qty}× ${i.name}`).join(' · ')}</div>
      <div class="log-foot">
        <span class="log-total">₱${o.total}</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="log-method">${o.method}</span>
          <button class="reprint-btn" onclick='reprintOrder(${JSON.stringify(o)})'>🖨️ Reprint</button>
        </div>
      </div>
    </div>`).join('');
}

function reprintOrder(o){
  showReceiptModal(o.items,o.method,o);
}

// ── REPORTS ───────────────────────────────────
async function renderReports(){
  await loadOrders();
  const totalRev=orderHistory.reduce((s,o)=>s+o.total,0);
  const n=orderHistory.length;
  const avg=n?Math.round(totalRev/n):0;
  const itemCounts={},catRev={};
  orderHistory.forEach(o=>o.items.forEach(i=>{
    itemCounts[i.name]=(itemCounts[i.name]||0)+i.qty;
    catRev[i.cat]=(catRev[i.cat]||0)+i.price*i.qty;
  }));
  const topCat=Object.keys(catRev).sort((a,b)=>catRev[b]-catRev[a])[0]||'—';
  document.getElementById('metrics-grid').innerHTML=`
    <div class="metric-card"><div class="metric-lbl">Revenue Today</div><div class="metric-val" style="color:var(--green)">₱${totalRev.toLocaleString()}</div></div>
    <div class="metric-card"><div class="metric-lbl">Total Orders</div><div class="metric-val">${n}</div></div>
    <div class="metric-card"><div class="metric-lbl">Avg Order</div><div class="metric-val">₱${avg}</div></div>
    <div class="metric-card"><div class="metric-lbl">Top Category</div><div class="metric-val" style="font-size:18px">${topCat}</div></div>`;
  const sorted=Object.entries(itemCounts).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const maxC=sorted[0]?sorted[0][1]:1;
  document.getElementById('top-items').innerHTML=sorted.length?sorted.map(([name,cnt],i)=>`
    <div class="rank-item"><span class="rank-n">${i+1}</span>
      <div class="rank-bw"><div style="font-size:12px">${name}</div><div class="rank-bar" style="width:${Math.round(cnt/maxC*100)}%"></div></div>
      <span style="font-weight:700;font-size:12px;min-width:28px;text-align:right">${cnt}</span>
    </div>`).join(''):'<div class="no-data">No sales yet</div>';
  const catS=Object.entries(catRev).sort((a,b)=>b[1]-a[1]);
  const maxR=catS[0]?catS[0][1]:1;
  document.getElementById('rev-cat').innerHTML=catS.length?catS.map(([cat,rev])=>`
    <div class="rank-item">
      <div class="rank-bw"><div style="font-size:12px">${cat}</div><div class="rank-bar" style="width:${Math.round(rev/maxR*100)}%;background:var(--teal-m)"></div></div>
      <span class="rank-amt">₱${rev.toLocaleString()}</span>
    </div>`).join(''):'<div class="no-data">No sales yet</div>';
}

// ── HELPERS ───────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['pos','inventory','orders','reports'][i]===tab);
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='inventory') renderInventory();
  if(tab==='orders') renderOrders();
  if(tab==='reports') renderReports();
}
function setLoading(msg){document.getElementById('loading-msg').textContent=msg;}
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}

init().catch(e=>{setLoading('Error: '+e.message);console.error(e);});
</script>
