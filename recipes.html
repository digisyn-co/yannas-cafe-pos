<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Book — Yanna's Café</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAF8F4;--surface:#fff;--surface2:#F5F2ED;
  --border:#E8E3DA;--border2:#D4CEC4;
  --text:#1A1815;--text2:#6B665C;--text3:#9E9889;
  --gold:#B8943D;--gold-bg:#FBF6EC;--gold-border:#E8D9B0;
  --green:#1B7A43;--green-bg:#ECFDF3;
  --amber:#92610E;--amber-bg:#FFFBEB;
  --blue:#1D4ED8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
body{padding:24px 24px 80px}

.header{margin-bottom:32px}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--gold)}
h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,36px);font-weight:700;line-height:1.15;margin-bottom:6px}
.sub{font-size:14px;color:var(--text2);line-height:1.6}

/* Category pills */
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;position:sticky;top:0;background:var(--bg);padding:12px 0;z-index:10}
.cat-btn{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;transition:.15s}
.cat-btn.on{background:var(--text);color:#fff;border-color:var(--text)}
.cat-btn:hover:not(.on){border-color:var(--text2)}

/* Accordion card */
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;transition:.2s}
.card.open{box-shadow:0 4px 20px rgba(0,0,0,0.06)}
.card.is-batch{border-left:4px solid var(--gold)}
.card-head{display:flex;align-items:center;flex-wrap:wrap;gap:6px 12px;padding:16px 20px;cursor:pointer;user-select:none;transition:.1s}
.card-head:hover{background:var(--surface2)}
.card-arrow{width:24px;height:24px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);flex-shrink:0;transition:.2s}
.card.open .card-arrow{transform:rotate(90deg);background:var(--gold-bg);color:var(--gold)}
.card-name{flex:1;min-width:130px;font-size:15px;font-weight:700}
.card-name .star{color:var(--gold);font-size:13px}
.card-tag{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:6px;flex-shrink:0}
.tag-coffee{background:#FFF3E0;color:#E65100}
.tag-matcha{background:#E8F5E9;color:#2E7D32}
.tag-tea{background:#E0F2F1;color:#00695C}
.tag-food{background:#EDE7F6;color:#4527A0}
.tag-batch{background:#FBF6EC;color:#8A6A1F}
.tag-kids{background:#FCE4EC;color:#AD1457}
.tag-refreshers{background:#FFF8E1;color:#B26A00}
.card-price{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0;margin-left:6px}
.card-body{display:none;border-top:1px solid var(--border)}
.card.open .card-body{display:block}

/* Serving control */
.serving-bar{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border)}
.serving-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.s-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:.12s;flex-shrink:0}
.s-btn:active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
.s-slider{flex:1;-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;background:var(--border);outline:none;cursor:pointer}
.s-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--gold);cursor:pointer;border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,0.15)}
.s-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text);min-width:36px;text-align:center}

/* Ingredients table */
.ing-table{width:100%;border-collapse:collapse}
.ing-table th{text-align:left;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:10px 20px;border-bottom:2px solid var(--border)}
.ing-table th.r{text-align:right}
.ing-table td{padding:9px 20px;border-bottom:1px solid rgba(0,0,0,0.04);font-size:13px}
.ing-table td.name{font-weight:600}
.ing-table td.unit{color:var(--text3);font-size:12px}
.ing-table td.amt{text-align:right;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums;font-size:14px}
.ing-table tr:last-child td{border-bottom:none}

/* Steps */
.steps-section{padding:16px 20px;border-top:1px solid var(--border)}
.steps-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.step:last-child{margin-bottom:0}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--text);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:var(--text2);line-height:1.6}
.step-text strong{color:var(--text)}

/* Notes */
.note{margin:0 20px 16px;padding:12px 16px;border-radius:10px;font-size:12px;line-height:1.6}
.note.warn{background:#FFF3E0;border:1px solid #FFE0B2;color:#E65100}
.note.info{background:var(--gold-bg);border:1px solid var(--gold-border);color:var(--amber)}
.note.speed{background:var(--green-bg);border:1px solid #A3DFBB;color:var(--green)}

/* Footer */
.footer{margin-top:40px;text-align:center;font-size:12px;color:var(--text3);padding-top:20px;border-top:1px solid var(--border)}

@media(max-width:480px){
  body{padding:16px 12px 60px}
  .card-head{padding:14px 16px}
  .serving-bar{padding:12px 16px}
  .ing-table td,.ing-table th{padding:8px 16px}
  .steps-section{padding:14px 16px}
}
</style>
</head>

const CATS=['All','Batch','Coffee','Matcha','Tea','Food','Kids','Refreshers'];
let filter='All', openId=null;

function render(){
  document.getElementById('cats').innerHTML=CATS.map(c=>
    '<button class="cat-btn'+(c===filter?' on':'')+'" onclick="setFilter(\''+c+'\')">'+c+'</button>'
  ).join('');

  const items=RECIPES.filter(r=>filter==='All'||r.cat===filter);
  document.getElementById('recipe-list').innerHTML=items.map(r=>{
    const isOpen=openId===r.id;
    const tagClass={Coffee:'tag-coffee',Matcha:'tag-matcha',Tea:'tag-tea',Food:'tag-food'}[r.cat]||'';
    const star=r.star?' <span class="star">★</span>':'';

    let body='';
    if(isOpen){
      // Serving control
      const sv=getServing(r.id);
      body+='<div class="serving-bar">'+
        '<span class="serving-label">Servings</span>'+
        '<button class="s-btn" onclick="event.stopPropagation();adj('+r.id+',-1)">−</button>'+
        '<input type="range" class="s-slider" min="1" max="50" value="'+sv+'" oninput="event.stopPropagation();setServing('+r.id+',this.value)">'+
        '<button class="s-btn" onclick="event.stopPropagation();adj('+r.id+',1)">+</button>'+
        '<span class="s-val" id="sv-'+r.id+'">'+sv+'</span>'+
      '</div>';

      // Ingredients table
      body+='<table class="ing-table"><thead><tr><th>Ingredient</th><th>Unit</th><th class="r">Amount</th></tr></thead><tbody>';
      r.ingredients.forEach(i=>{
        const scaled=i.amt*sv;
        body+='<tr><td class="name">'+i.name+'</td><td class="unit">'+i.unit+'</td><td class="amt">'+fmt(scaled)+'</td></tr>';
      });
      body+='</tbody></table>';

      // Notes (before steps)
      r.notes.forEach(n=>{
        body+='<div class="note '+n.type+'">'+n.text+'</div>';
      });

      // Steps
      if(r.steps.length){
        body+='<div class="steps-section"><div class="steps-title">👨‍🍳 How to Make It</div>';
        r.steps.forEach((s,i)=>{
          body+='<div class="step"><div class="step-num">'+(i+1)+'</div><div class="step-text">'+s+'</div></div>';
        });
        body+='</div>';
      }
    }

    return '<div class="card'+(isOpen?' open':'')+(r.batch?' is-batch':'')+'" id="card-'+r.id+'">'+
      '<div class="card-head" onclick="toggle('+r.id+')">'+
        '<div class="card-arrow">›</div>'+
        '<div class="card-name">'+r.name+star+'</div>'+
        '<span class="card-tag '+tagClass+'">'+r.cat+'</span>'+
        '<span class="card-price">'+r.price+'</span>'+
      '</div>'+
      '<div class="card-body">'+body+'</div>'+
    '</div>';
  }).join('');
}

const servings={};
function getServing(id){ return servings[id]||1; }
function setServing(id,v){
  v=Math.max(1,Math.min(50,parseInt(v)||1));
  servings[id]=v;
  render();
}
function adj(id,d){ setServing(id,getServing(id)+d); }
function toggle(id){ openId=openId===id?null:id; render(); }
function setFilter(c){ filter=c; openId=null; render(); }
function fmt(n){
  if(n>=1000) return (n/1000).toFixed(1)+'kg';
  if(n>=100) return Math.round(n).toString();
  if(n%1===0) return n.toString();
  return n.toFixed(1);
}

render();
</script>
