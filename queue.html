<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Status — Yanna's Café</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#FFFFFF;--bg2:#F7F5F2;--bg3:#EFECE8;--gold:#9E7B2F;--gold-d:#7A5F1F;--text:#1A1815;--text2:rgba(26,24,21,0.55);--text3:rgba(26,24,21,0.3);--green:#1B7A43;--amber:#D97706;--blue:#1D4ED8;--sep:rgba(0,0,0,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

#app{height:100%;display:grid;grid-template-rows:auto 1fr;grid-template-columns:1fr 1fr}

/* ── Header ── */
.header{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 40px;
  background:var(--bg2);border-bottom:1px solid var(--sep);
}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{height:48px;border-radius:12px}
.header-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:900}
.header-right{display:flex;align-items:center;gap:20px}
.header-clock{font-size:32px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
.header-badge{
  font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--green);background:rgba(52,199,89,0.1);
  padding:6px 16px;border-radius:20px;
  border:1px solid rgba(52,199,89,0.2);
  display:flex;align-items:center;gap:8px;
}
.hb-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(52,199,89,0.2)}50%{box-shadow:0 0 0 8px rgba(52,199,89,0.04)}}

/* ── Columns ── */
.queue-col{
  display:flex;flex-direction:column;
  padding:24px 32px;overflow:hidden;
}
.queue-col:first-of-type{border-right:1px solid var(--sep)}

.queue-label{
  font-size:14px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  margin-bottom:20px;display:flex;align-items:center;gap:10px;
}
.queue-label.prep{color:var(--blue)}
.queue-label.ready{color:var(--green)}
.queue-label .ql-count{
  font-size:12px;padding:3px 12px;border-radius:20px;
}
.queue-label.prep .ql-count{background:rgba(0,122,255,0.1);color:var(--blue)}
.queue-label.ready .ql-count{background:rgba(52,199,89,0.1);color:var(--green)}

.queue-list{flex:1;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.queue-list::-webkit-scrollbar{display:none}

/* ── Order tiles ── */
.q-tile{
  background:var(--bg2);border-radius:16px;
  padding:20px 24px;
  border:1px solid var(--sep);
  display:flex;align-items:center;gap:20px;
  animation:slide-in .4s ease;
}
@keyframes slide-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.q-tile.preparing{border-left:5px solid var(--blue)}
.q-tile.ready{border-left:5px solid var(--green);background:rgba(52,199,89,0.04)}

.q-num{
  font-family:'Playfair Display',serif;
  font-size:32px;font-weight:900;
  min-width:140px;
}
.q-tile.preparing .q-num{color:var(--blue)}
.q-tile.ready .q-num{color:var(--green)}

.q-info{flex:1}
.q-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px}
.q-items{font-size:13px;color:var(--text2)}

.q-status{
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:6px 16px;border-radius:20px;flex-shrink:0;
}
.q-tile.preparing .q-status{color:var(--blue);background:rgba(0,122,255,0.1)}
.q-tile.ready .q-status{color:var(--green);background:rgba(52,199,89,0.1)}

/* ── Empty ── */
.q-empty{
  text-align:center;padding:60px 20px;
  color:var(--text3);font-size:16px;
}
.q-empty-icon{font-size:48px;margin-bottom:14px;opacity:.3}

/* ── Ready flash ── */
.q-tile.ready-flash{animation:ready-pop .6s ease}
@keyframes ready-pop{0%{transform:scale(1.03);box-shadow:0 0 30px rgba(52,199,89,0.3)}100%{transform:scale(1);box-shadow:none}}

/* ── Footer ticker ── */
.ticker{
  grid-column:1/-1;
  background:var(--bg2);border-top:1px solid var(--sep);
  padding:12px 40px;
  display:flex;align-items:center;gap:20px;
  font-size:13px;color:var(--text3);
}
.ticker-dot{width:6px;height:6px;border-radius:50%;background:var(--gold-d)}

@media(max-width:768px){
  #app{grid-template-columns:1fr}
  .queue-col:first-of-type{border-right:none;border-bottom:1px solid var(--sep)}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-title">☕ Yanna's Café</div>
    </div>
    <div class="header-right">
      <div class="header-badge"><span class="hb-dot"></span> Live Orders</div>
      <div class="header-clock" id="clock">--:--</div>
    </div>
  </div>

  <div class="queue-col">
    <div class="queue-label prep">
      👨‍🍳 Now Preparing
      <span class="ql-count" id="cnt-prep">0</span>
    </div>
    <div class="queue-list" id="list-prep"></div>
  </div>

  <div class="queue-col">
    <div class="queue-label ready">
      ✅ Ready for Pickup
      <span class="ql-count" id="cnt-ready">0</span>
    </div>
    <div class="queue-list" id="list-ready"></div>
  </div>

  <div class="ticker">
    <span class="ticker-dot"></span>
    <span>Yanna's Vietnamese Coffee · San Enrique, Iloilo</span>
    <span class="ticker-dot"></span>
    <span>Drive-thru orders are timed for freshness</span>
    <span class="ticker-dot"></span>
    <span id="ticker-count">0 orders today</span>
  </div>
</div>

<script>
const SUPABASE_URL='https://dgjtpxdbztnokfbmfjbw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnanRweGRienRub2tmYm1mamJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NjY5NDAsImV4cCI6MjA5NTM0Mjk0MH0.uUyk7ppnom9PI--Fs_5wdhqQD-dtAmpB5Gv1hup6dAk';

let sb, orders = [];

window.addEventListener('load', () => {
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    loadOrders();
    subscribe();
  } catch(e) { console.error(e); }
  tickClock();
  setInterval(tickClock, 1000);
  setInterval(loadOrders, 60000); // full refresh every minute
});

function tickClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-PH', {hour:'2-digit',minute:'2-digit',hour12:true});
}

async function loadOrders() {
  try {
    const {data} = await sb.from('drive_thru_orders').select('*')
      .in('status', ['preparing','ready'])
      .order('created_at', {ascending: true});
    orders = data || [];

    // Get today's total count for ticker
    const today = new Date().toISOString().slice(0,10);
    const {count} = await sb.from('drive_thru_orders').select('*', {count:'exact', head:true})
      .gte('created_at', today+'T00:00:00+08:00');
    document.getElementById('ticker-count').textContent = (count||0) + ' orders today';

    render();
  } catch(e) { console.error(e); }
}

function subscribe() {
  sb.channel('queue-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'drive_thru_orders'}, payload => {
      const d = payload.new;
      if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
        const idx = orders.findIndex(o => o.id === d.id);
        if (d.status === 'preparing' || d.status === 'ready') {
          if (idx >= 0) orders[idx] = d; else orders.push(d);
        } else {
          if (idx >= 0) orders.splice(idx, 1);
        }
      }
      render();
    }).subscribe();
}

function render() {
  const preparing = orders.filter(o => o.status === 'preparing');
  const ready = orders.filter(o => o.status === 'ready');

  document.getElementById('cnt-prep').textContent = preparing.length;
  document.getElementById('cnt-ready').textContent = ready.length;

  renderList('list-prep', preparing, 'preparing');
  renderList('list-ready', ready, 'ready');
}

function renderList(id, items, status) {
  const el = document.getElementById(id);
  if (!items.length) {
    el.innerHTML = '<div class="q-empty"><div class="q-empty-icon">' +
      (status==='preparing'?'👨‍🍳':'🎉') + '</div>' +
      (status==='preparing'?'All caught up!':'No orders ready yet') + '</div>';
    return;
  }
  el.innerHTML = items.map(o => {
    const num = esc(o.order_number || '#???');
    const name = esc(o.customer_name || 'Customer');
    const itemStr = summarizeItems(o.items);
    return '<div class="q-tile ' + status + '">' +
      '<div class="q-num">' + num + '</div>' +
      '<div class="q-info"><div class="q-name">' + name + '</div><div class="q-items">' + itemStr + '</div></div>' +
      '<div class="q-status">' + (status==='preparing'?'Preparing':'Ready!') + '</div>' +
    '</div>';
  }).join('');
}

function summarizeItems(items) {
  if (!items) return '';
  let arr = items;
  if (typeof items === 'string') try { arr = JSON.parse(items); } catch(e) { return esc(items); }
  if (!Array.isArray(arr)) return '';
  return arr.map(i => {
    const qty = i.qty || i.quantity || 1;
    const name = i.name || i.item || '?';
    return qty + '× ' + esc(name);
  }).join(', ');
}

function esc(s) { return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }
</script>
</body>
</html>
